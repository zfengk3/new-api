name: Publish Docker image (main GHCR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_push:
    name: Build and push amd64 image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine image version
        id: version
        run: |
          VERSION="main-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}:latest
            ghcr.io/${{ env.GHCR_REPOSITORY }}:main
            ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ steps.version.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Delete old GHCR versions
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = process.env.PACKAGE_NAME;
            const packageType = "container";
            const keep = 10;

            async function getOwnerType() {
              try {
                const { data } = await github.rest.users.getByUsername({ username: owner });
                return data.type;
              } catch (error) {
                core.warning(`Failed to resolve owner type for ${owner}: ${error.message}`);
                return "User";
              }
            }

            async function listVersions(ownerType) {
              if (ownerType === "Organization") {
                return github.paginate(
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
                  {
                    package_type: packageType,
                    package_name: packageName,
                    org: owner,
                    per_page: 100,
                  }
                );
              }

              return github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                {
                  package_type: packageType,
                  package_name: packageName,
                  username: owner,
                  per_page: 100,
                }
              );
            }

            async function deleteVersion(ownerType, versionId) {
              if (ownerType === "Organization") {
                return github.rest.packages.deletePackageVersionForOrg({
                  package_type: packageType,
                  package_name: packageName,
                  org: owner,
                  package_version_id: versionId,
                });
              }

              return github.rest.packages.deletePackageVersionForUser({
                package_type: packageType,
                package_name: packageName,
                username: owner,
                package_version_id: versionId,
              });
            }

            const ownerType = await getOwnerType();
            const versions = await listVersions(ownerType);
            const sorted = versions
              .filter((version) => !version.metadata?.container?.tags?.includes("latest"))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = sorted.slice(keep);
            core.info(`Found ${sorted.length} non-latest package versions, deleting ${toDelete.length}.`);

            for (const version of toDelete) {
              const tags = version.metadata?.container?.tags?.join(", ") || "(untagged)";
              core.info(`Deleting version ${version.id} with tags: ${tags}`);
              await deleteVersion(ownerType, version.id);
            }
